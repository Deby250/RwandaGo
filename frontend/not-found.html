<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Page Not Found | RwandaGo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>body{background:linear-gradient(135deg,#0a3b2f 0%,#06261e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.notfound-container{max-width:500px;width:100%;background:white;border-radius:24px;overflow:hidden;text-align:center}.notfound-header{background:linear-gradient(135deg,#0a3b2f,#06261e);padding:2rem}.notfound-header h1{font-size:6rem;color:#e67e22;margin-bottom:0.5rem}.notfound-body{padding:2rem}.btn-group{display:flex;gap:1rem;margin-top:1.5rem}.btn-primary{flex:1;background:#e67e22;color:white;text-decoration:none;padding:1rem;border-radius:12px;font-weight:600}.btn-outline{flex:1;border:2px solid #e67e22;background:transparent;color:#e67e22;text-decoration:none;padding:1rem;border-radius:12px;font-weight:600}@media(max-width:480px){.btn-group{flex-direction:column}}</style>
</head>
<body>
<div class="notfound-container"><div class="notfound-header"><h1>404</h1><p style="color:rgba(255,255,255,0.8)">Page Not Found</p></div>
<div class="notfound-body"><i class="fas fa-compass" style="font-size:3rem;color:#e67e22;margin-bottom:1rem"></i><p>Oops! The page you're looking for doesn't exist.</p>
<div class="btn-group"><a href="index.html" class="btn-primary">Go Home</a><a href="dashboard/tourist/index.html" class="btn-outline">Dashboard</a></div></div></div>
