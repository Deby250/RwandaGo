<!-- payment-failed.html -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Payment Failed | RwandaGo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>body{background:linear-gradient(135deg,#0a3b2f 0%,#06261e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.failed-container{max-width:500px;width:100%;background:white;border-radius:24px;overflow:hidden;text-align:center}.failed-header{background:#dc2626;padding:2rem}.failed-header i{font-size:5rem;color:white;margin-bottom:1rem}.failed-header h1{color:white;font-size:1.8rem}.failed-body{padding:2rem}.btn-group{display:flex;gap:1rem;margin-top:1.5rem}.btn-primary{flex:1;background:#e67e22;color:white;text-decoration:none;padding:1rem;border-radius:12px;font-weight:600}.btn-outline{flex:1;border:2px solid #e67e22;background:transparent;color:#e67e22;text-decoration:none;padding:1rem;border-radius:12px;font-weight:600}@media(max-width:480px){.btn-group{flex-direction:column}}</style>
</head>
<body>
<div class="failed-container"><div class="failed-header"><i class="fas fa-times-circle"></i><h1>Payment Failed</h1></div>
<div class="failed-body"><i class="fas fa-exclamation-triangle" style="font-size:3rem;color:#dc2626;margin-bottom:1rem"></i><p>We couldn't process your payment. Please try again.</p>
<div class="btn-group"><a href="payment.html" class="btn-primary">Try Again</a><a href="dashboard/tourist/new-booking.html" class="btn-outline">Back to Booking</a></div></div></div>
</body>
</html>
