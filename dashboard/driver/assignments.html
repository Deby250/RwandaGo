<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Assignments | Driver Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <style>
        .filter-bar { display: flex; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem; }
        .filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .filter-chip { padding: 0.5rem 1rem; background: #f8f9fa; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
        .filter-chip.active { background: var(--secondary); color: white; }
        .assignment-status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-inprogress { background: #d1ecf1; color: #0c5460; }
        .status-completed { background: #d4edda; color: #155724; }
        .action-btn { padding: 4px 8px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.75rem; background: var(--secondary); color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 16px; max-width: 500px; width: 90%; }
        .modal-header { padding: 1rem; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; }
        .modal-body { padding: 1rem; }
        .modal-footer { padding: 1rem; border-top: 1px solid #e0e0e0; display: flex; justify-content: flex-end; gap: 0.5rem; }
        .close { cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><i class="fas fa-car"></i><h3>RwandaGo</h3><p>Driver Portal</p></div>
            <nav class="sidebar-nav">
                <a href="overview.html"><i class="fas fa-tachometer-alt"></i> Overview</a>
                <a href="assignments.html" class="active"><i class="fas fa-tasks"></i> Assignments</a>
                <a href="routes.html"><i class="fas fa-route"></i> Routes</a>
                <a href="earnings.html"><i class="fas fa-money-bill"></i> Earnings</a>
                <a href="vehicle.html"><i class="fas fa-car"></i> My Vehicle</a>
                <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1>My Assignments</h1>
                <div class="user-info">
                    <div class="user-dropdown" id="userDropdown">
                        <i class="fas fa-user-circle" style="font-size: 2rem;"></i>
                        <span class="user-name" id="userName">Driver</span>
                        <i class="fas fa-chevron-down"></i>
                        <div class="dropdown-menu"><a href="#" id="dropdownLogout"><i class="fas fa-sign-out-alt"></i> Logout</a></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><h2><i class="fas fa-tasks"></i> Today's Assignments</h2></div>
                <div class="filter-bar">
                    <div class="filter-group">
                        <button class="filter-chip active" data-filter="all">All</button>
                        <button class="filter-chip" data-filter="pending">Pending</button>
                        <button class="filter-chip" data-filter="in-progress">In Progress</button>
                        <button class="filter-chip" data-filter="completed">Completed</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead><tr><th>Time</th><th>Customer</th><th>Pickup</th><th>Destination</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody id="assignmentsList"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="assignmentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Update Assignment</h3><span class="close">&times;</span></div>
            <div class="modal-body"><p><strong>Customer:</strong> <span id="modalCustomer"></span></p><p><strong>Pickup:</strong> <span id="modalPickup"></span></p><div class="form-group"><label>Status</label><select id="updateStatus" class="w-100"><option value="pending">Pending</option><option value="in-progress">In Progress</option><option value="completed">Completed</option></select></div></div>
            <div class="modal-footer"><button class="btn-secondary modal-close">Cancel</button><button class="btn-primary" id="updateAssignmentBtn">Update</button></div>
        </div>
    </div>

    <script src="../../assets/js/core/session.js"></script>
    <script>
        let assignments = [
            { id: 1, time: '09:00 AM', customer: 'Sarah Chen', pickup: 'Kigali Marriott', destination: 'Volcanoes NP', status: 'pending' },
            { id: 2, time: '02:00 PM', customer: 'John Doe', pickup: 'Hotel des Mille Collines', destination: 'Kigali Airport', status: 'pending' }
        ];
        let currentFilter = 'all';

        const user = session.getCurrentUser();
        if (!user || user.role !== 'driver') window.location.href = '../../login.html';
        document.getElementById('userName').textContent = user.name || 'Driver';

        function loadAssignments() {
            let filtered = currentFilter === 'all' ? assignments : assignments.filter(a => a.status === currentFilter);
            displayAssignments(filtered);
        }

        function displayAssignments(assignmentsList) {
            const tbody = document.getElementById('assignmentsList');
            if (assignmentsList.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="text-center">No assignments found</td></tr>'; return; }
            tbody.innerHTML = assignmentsList.map(a => `<tr><td>${a.time}</td><td>${a.customer}</td><td>${a.pickup}</td><td>${a.destination}</td><td><span class="assignment-status status-${a.status === 'in-progress' ? 'inprogress' : a.status}">${a.status}</span></td><td><button class="action-btn" onclick="updateAssignment(${a.id})">Update</button></td></tr>`).join('');
        }

        function updateAssignment(id) {
            const assignment = assignments.find(a => a.id === id);
            document.getElementById('modalCustomer').textContent = assignment.customer;
            document.getElementById('modalPickup').textContent = assignment.pickup;
            document.getElementById('updateStatus').value = assignment.status;
            document.getElementById('assignmentModal').style.display = 'flex';
            window.currentAssignmentId = id;
        }

        document.getElementById('updateAssignmentBtn').addEventListener('click', () => {
            const assignment = assignments.find(a => a.id === window.currentAssignmentId);
            if (assignment) { assignment.status = document.getElementById('updateStatus').value; loadAssignments(); alert('Assignment updated'); document.getElementById('assignmentModal').style.display = 'none'; }
        });

        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active'); currentFilter = chip.dataset.filter; loadAssignments();
            });
        });
        document.querySelectorAll('.close, .modal-close').forEach(el => { el.addEventListener('click', () => document.getElementById('assignmentModal').style.display = 'none'); });
        document.getElementById('logoutBtn').addEventListener('click', () => { session.clearSession(); window.location.href = '../../login.html'; });
        document.getElementById('dropdownLogout').addEventListener('click', () => { session.clearSession(); window.location.href = '../../login.html'; });
        document.getElementById('userDropdown').addEventListener('click', () => document.querySelector('.dropdown-menu').classList.toggle('show'));
        document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('active'));
        loadAssignments();
    </script>
</body>
</html>
