<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Dashboard | RwandaGo</title>
<script>
const user = sessionStorage.getItem('rwandago_user') || localStorage.getItem('rwandago_user');
if (!user) { window.location.href = '../../login.html'; }
else {
    const userData = JSON.parse(user);
    if (userData.role !== 'admin') { alert('Access denied. Admin portal only.'); window.location.href = '../../index.html'; }
    else { window.location.href = 'overview.html'; }
}
</script>
</head>
<body>Redirecting to dashboard...</body>
</html>
