<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tourist Dashboard | RwandaGo</title>
<script>
const user = sessionStorage.getItem('rwandago_user') || localStorage.getItem('rwandago_user');
if (!user) { window.location.href = '../../login.html'; }
else {
    const userData = JSON.parse(user);
    if (userData.role !== 'tourist') { alert('Access denied. Tourist portal only.'); window.location.href = '../../index.html'; }
    else { window.location.href = 'overview.html'; }
}
</script>
<!-- Backend Bridge - MUST be loaded before other scripts -->
<script src="assets/js/bridge.js"></script>
<!-- Add before bridge.js -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="assets/js/bridge.js"></script>
</head>
<body>Redirecting to dashboard...</body>
</html>
