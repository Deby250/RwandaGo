<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Tickets | Support Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <style>
        .filter-bar { display: flex; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem; }
        .filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .filter-chip { padding: 0.5rem 1rem; background: #f8f9fa; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
        .filter-chip.active { background: var(--secondary); color: white; }
        .priority-high { color: #dc3545; font-weight: bold; }
        .priority-medium { color: #f39c12; font-weight: bold; }
        .priority-low { color: #27ae60; font-weight: bold; }
        .ticket-status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-open { background: #f8d7da; color: #721c24; }
        .status-progress { background: #fff3cd; color: #856404; }
        .status-resolved { background: #d4edda; color: #155724; }
        .action-btn { padding: 4px 8px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.75rem; background: var(--secondary); color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 16px; max-width: 500px; width: 90%; }
        .modal-header { padding: 1rem; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; }
        .modal-body { padding: 1rem; }
        .modal-footer { padding: 1rem; border-top: 1px solid #e0e0e0; display: flex; justify-content: flex-end; gap: 0.5rem; }
        .close { cursor: pointer; font-size: 1.5rem; }
        .message-bubble { background: #f8f9fa; padding: 0.5rem; border-radius: 8px; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><i class="fas fa-car"></i><h3>RwandaGo</h3><p>Support Portal</p></div>
            <nav class="sidebar-nav">
                <a href="overview.html"><i class="fas fa-tachometer-alt"></i> Overview</a>
                <a href="tickets.html" class="active"><i class="fas fa-ticket-alt"></i> Tickets</a>
                <a href="chat.html"><i class="fas fa-comments"></i> Live Chat</a>
                <a href="emergency.html"><i class="fas fa-ambulance"></i> Emergency</a>
                <a href="customers.html"><i class="fas fa-users"></i> Customers</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1>Support Tickets</h1>
                <div class="user-info">
                    <div class="user-dropdown" id="userDropdown">
                        <i class="fas fa-user-circle" style="font-size: 2rem;"></i>
                        <span class="user-name" id="userName">Support</span>
                        <i class="fas fa-chevron-down"></i>
                        <div class="dropdown-menu"><a href="#" id="dropdownLogout"><i class="fas fa-sign-out-alt"></i> Logout</a></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><h2><i class="fas fa-ticket-alt"></i> All Support Tickets</h2></div>
                <div class="filter-bar">
                    <div class="filter-group">
                        <button class="filter-chip active" data-filter="all">All</button>
                        <button class="filter-chip" data-filter="open">Open</button>
                        <button class="filter-chip" data-filter="in-progress">In Progress</button>
                        <button class="filter-chip" data-filter="resolved">Resolved</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead><tr><th>ID</th><th>Customer</th><th>Subject</th><th>Priority</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody id="ticketsList"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="ticketModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Ticket Details</h3><span class="close">&times;</span></div>
            <div class="modal-body" id="ticketModalBody"></div>
            <div class="modal-footer"><button class="btn-secondary modal-close">Close</button><button class="btn-primary" id="replyBtn">Reply</button></div>
        </div>
    </div>

    <script src="../../assets/js/core/session.js"></script>
    <script>
        let tickets = [
            { id: 'TKT001', customer: 'John Doe', subject: 'Late Return Issue', priority: 'high', status: 'open', messages: [{ sender: 'John Doe', message: 'I returned my car late, what are the charges?', date: 'Dec 1, 2024' }] },
            { id: 'TKT002', customer: 'Sarah Chen', subject: 'Payment Failed', priority: 'medium', status: 'in-progress', messages: [{ sender: 'Sarah Chen', message: 'My payment keeps failing', date: 'Nov 30, 2024' }] },
            { id: 'TKT003', customer: 'Maria Garcia', subject: 'Vehicle Issue', priority: 'high', status: 'open', messages: [{ sender: 'Maria Garcia', message: 'Check engine light is on', date: 'Nov 29, 2024' }] }
        ];
        let currentFilter = 'all';

        const user = session.getCurrentUser();
        if (!user || user.role !== 'support') window.location.href = '../../login.html';
        document.getElementById('userName').textContent = user.name || 'Support';

        function loadTickets() {
            let filtered = currentFilter === 'all' ? tickets : tickets.filter(t => t.status === currentFilter);
            displayTickets(filtered);
        }

        function displayTickets(ticketsList) {
            const tbody = document.getElementById('ticketsList');
            if (ticketsList.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="text-center">No tickets found</td></tr>'; return; }
            tbody.innerHTML = ticketsList.map(t => `
                <tr>
                    <td>${t.id}</td><td>${t.customer}</td><td>${t.subject}</td>
                    <td><span class="priority-${t.priority}">${t.priority}</span></td>
                    <td><span class="ticket-status status-${t.status === 'open' ? 'open' : t.status === 'in-progress' ? 'progress' : 'resolved'}">${t.status}</span></td>
                    <td><button class="action-btn" onclick="viewTicket('${t.id}')">View</button></td>
                </tr>`).join('');
        }

        function viewTicket(id) {
            const ticket = tickets.find(t => t.id === id);
            const modalBody = document.getElementById('ticketModalBody');
            modalBody.innerHTML = `<p><strong>Ticket ID:</strong> ${ticket.id}</p><p><strong>Customer:</strong> ${ticket.customer}</p><p><strong>Subject:</strong> ${ticket.subject}</p><p><strong>Priority:</strong> ${ticket.priority}</p><div class="message-bubble"><strong>${ticket.messages[0].sender}:</strong><br>${ticket.messages[0].message}<br><small>${ticket.messages[0].date}</small></div><textarea id="replyMessage" class="w-100" rows="3" placeholder="Type your reply..."></textarea>`;
            document.getElementById('ticketModal').style.display = 'flex';
            document.getElementById('replyBtn').onclick = () => { alert(`Reply sent to ${ticket.customer}`); document.getElementById('ticketModal').style.display = 'none'; };
        }

        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active'); currentFilter = chip.dataset.filter; loadTickets();
            });
        });
        document.querySelectorAll('.close, .modal-close').forEach(el => { el.addEventListener('click', () => document.getElementById('ticketModal').style.display = 'none'); });
        document.getElementById('logoutBtn').addEventListener('click', () => { session.clearSession(); window.location.href = '../../login.html'; });
        document.getElementById('dropdownLogout').addEventListener('click', () => { session.clearSession(); window.location.href = '../../login.html'; });
        document.getElementById('userDropdown').addEventListener('click', () => document.querySelector('.dropdown-menu').classList.toggle('show'));
        document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('active'));
        loadTickets();
    </script>
</body>
</html>
