<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Booking Cancelled | RwandaGo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>body{background:linear-gradient(135deg,#0a3b2f 0%,#06261e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.cancelled-container{max-width:500px;width:100%;background:white;border-radius:24px;overflow:hidden;text-align:center}.cancelled-header{background:#f39c12;padding:2rem}.cancelled-header i{font-size:5rem;color:white;margin-bottom:1rem}.cancelled-header h1{color:white;font-size:1.8rem}.cancelled-body{padding:2rem}.btn-primary{display:inline-block;background:#e67e22;color:white;text-decoration:none;padding:1rem 2rem;border-radius:12px;font-weight:600;margin-top:1rem}</style>
</head>
<body>
<div class="cancelled-container"><div class="cancelled-header"><i class="fas fa-ban"></i><h1>Booking Cancelled</h1></div>
<div class="cancelled-body"><i class="fas fa-refund" style="font-size:3rem;color:#f39c12;margin-bottom:1rem"></i><p>Your booking has been successfully cancelled.</p><p style="margin-top:0.5rem;color:#6c757d">Refund will be processed within 5-7 business days.</p><a href="dashboard/tourist/bookings.html" class="btn-primary">View My Bookings</a></div></div>
</body>
</html>
