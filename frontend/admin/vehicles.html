<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Vehicles | Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <style>
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .filter-chip {
            padding: 0.5rem 1rem;
            background: #f8f9fa;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .filter-chip.active {
            background: var(--secondary);
            color: white;
        }
        .search-bar {
            position: relative;
        }
        .search-bar input {
            padding: 0.5rem 2rem 0.5rem 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            width: 250px;
        }
        .search-bar i {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }
        .vehicle-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-available { background: #d4edda; color: #155724; }
        .status-rented { background: #fff3cd; color: #856404; }
        .status-maintenance { background: #f8d7da; color: #721c24; }
        .action-btn {
            padding: 4px 8px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            margin: 0 2px;
        }
        .btn-edit { background: var(--secondary); color: white; }
        .btn-delete { background: #dc3545; color: white; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 1rem;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body { padding: 1rem; }
        .modal-footer {
            padding: 1rem;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }
        .close { cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><i class="fas fa-car"></i><h3>RwandaGo</h3><p>Admin Portal</p></div>
            <nav class="sidebar-nav">
                <a href="overview.html"><i class="fas fa-tachometer-alt"></i> Overview</a>
                <a href="vehicles.html" class="active"><i class="fas fa-car"></i> Vehicles</a>
                <a href="bookings.html"><i class="fas fa-calendar-check"></i> Bookings</a>
                <a href="customers.html"><i class="fas fa-users"></i> Customers</a>
                <a href="reports.html"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1>Vehicle Management</h1>
                <div class="user-info">
                    <div class="user-dropdown" id="userDropdown">
                        <i class="fas fa-user-circle" style="font-size: 2rem;"></i>
                        <span class="user-name" id="userName">Admin</span>
                        <i class="fas fa-chevron-down"></i>
                        <div class="dropdown-menu">
                            <a href="#" id="dropdownLogout"><i class="fas fa-sign-out-alt"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-car"></i> Vehicle Fleet</h2>
                    <button class="btn-sm btn-primary-sm" id="addVehicleBtn"><i class="fas fa-plus"></i> Add Vehicle</button>
                </div>

                <div class="filter-bar">
                    <div class="filter-group">
                        <button class="filter-chip active" data-filter="all">All</button>
                        <button class="filter-chip" data-filter="available">Available</button>
                        <button class="filter-chip" data-filter="rented">Rented</button>
                        <button class="filter-chip" data-filter="maintenance">Maintenance</button>
                    </div>
                    <div class="search-bar">
                        <input type="text" id="searchVehicle" placeholder="Search vehicles...">
                        <i class="fas fa-search"></i>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Image</th>
                                <th>Vehicle</th>
                                <th>Plate</th>
                                <th>Price/Day</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="vehiclesList"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Vehicle Modal -->
    <div id="vehicleModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Vehicle</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <form id="vehicleForm">
                    <div class="form-group"><label>Vehicle Name</label><input type="text" id="vehicleName" required></div>
                    <div class="form-group"><label>Brand</label><input type="text" id="vehicleBrand" required></div>
                    <div class="form-group"><label>Model</label><input type="text" id="vehicleModel" required></div>
                    <div class="form-row">
                        <div class="form-group"><label>Year</label><input type="number" id="vehicleYear" required></div>
                        <div class="form-group"><label>Seats</label><input type="number" id="vehicleSeats" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Price/Day ($)</label><input type="number" id="vehiclePrice" required></div>
                        <div class="form-group"><label>Plate Number</label><input type="text" id="vehiclePlate" required></div>
                    </div>
                    <div class="form-group"><label>Status</label><select id="vehicleStatus"><option value="available">Available</option><option value="rented">Rented</option><option value="maintenance">Maintenance</option></select></div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary modal-close">Cancel</button>
                <button class="btn-primary" id="saveVehicleBtn">Save Vehicle</button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/core/session.js"></script>
    <script>
        let vehicles = [
            { id: 1, name: 'Toyota RAV4', brand: 'Toyota', model: 'RAV4', year: 2023, seats: 5, price: 55, plate: 'RAB 123A', status: 'available', image: '🚙' },
            { id: 2, name: 'Suzuki Jimny', brand: 'Suzuki', model: 'Jimny', year: 2023, seats: 4, price: 45, plate: 'RAB 456B', status: 'rented', image: '🚘' },
            { id: 3, name: 'Mitsubishi Pajero', brand: 'Mitsubishi', model: 'Pajero', year: 2022, seats: 7, price: 85, plate: 'RAB 789C', status: 'available', image: '🚐' },
            { id: 4, name: 'Hyundai i10', brand: 'Hyundai', model: 'i10', year: 2023, seats: 4, price: 30, plate: 'RAB 101D', status: 'maintenance', image: '🚗' }
        ];

        let currentFilter = 'all';
        let currentSearch = '';

        const user = session.getCurrentUser();
        if (!user || user.role !== 'admin') window.location.href = '../../login.html';
        document.getElementById('userName').textContent = user.name || 'Admin';

        function loadVehicles() {
            let filtered = [...vehicles];
            if (currentFilter !== 'all') filtered = filtered.filter(v => v.status === currentFilter);
            if (currentSearch) filtered = filtered.filter(v => v.name.toLowerCase().includes(currentSearch.toLowerCase()) || v.plate.toLowerCase().includes(currentSearch.toLowerCase()));
            displayVehicles(filtered);
        }

        function displayVehicles(vehiclesList) {
            const tbody = document.getElementById('vehiclesList');
            if (vehiclesList.length === 0) { tbody.innerHTML = '<tr><td colspan="7" class="text-center">No vehicles found</td></tr>'; return; }
            tbody.innerHTML = vehiclesList.map(v => `
                <tr>
                    <td>${v.id}</td><td style="font-size:1.5rem;">${v.image}</td>
                    <td>${v.name}</td><td>${v.plate}</td>
                    <td>$${v.price}</td>
                    <td><span class="vehicle-status status-${v.status}">${v.status}</span></td>
                    <td><button class="action-btn btn-edit" onclick="editVehicle(${v.id})">Edit</button><button class="action-btn btn-delete" onclick="deleteVehicle(${v.id})">Delete</button></td>
                </tr>`).join('');
        }

        function editVehicle(id) {
            const vehicle = vehicles.find(v => v.id === id);
            if (vehicle) {
                document.getElementById('modalTitle').textContent = 'Edit Vehicle';
                document.getElementById('vehicleName').value = vehicle.name;
                document.getElementById('vehicleBrand').value = vehicle.brand;
                document.getElementById('vehicleModel').value = vehicle.model;
                document.getElementById('vehicleYear').value = vehicle.year;
                document.getElementById('vehicleSeats').value = vehicle.seats;
                document.getElementById('vehiclePrice').value = vehicle.price;
                document.getElementById('vehiclePlate').value = vehicle.plate;
                document.getElementById('vehicleStatus').value = vehicle.status;
                document.getElementById('vehicleModal').style.display = 'flex';
                window.editingId = id;
            }
        }

        function deleteVehicle(id) {
            if (confirm('Are you sure you want to delete this vehicle?')) {
                vehicles = vehicles.filter(v => v.id !== id);
                loadVehicles();
                alert('Vehicle deleted successfully');
            }
        }

        document.getElementById('addVehicleBtn').addEventListener('click', () => {
            document.getElementById('modalTitle').textContent = 'Add New Vehicle';
            document.getElementById('vehicleForm').reset();
            document.getElementById('vehicleModal').style.display = 'flex';
            window.editingId = null;
        });

        document.getElementById('saveVehicleBtn').addEventListener('click', () => {
            const newVehicle = {
                id: window.editingId || vehicles.length + 1,
                name: document.getElementById('vehicleName').value,
                brand: document.getElementById('vehicleBrand').value,
                model: document.getElementById('vehicleModel').value,
                year: parseInt(document.getElementById('vehicleYear').value),
                seats: parseInt(document.getElementById('vehicleSeats').value),
                price: parseInt(document.getElementById('vehiclePrice').value),
                plate: document.getElementById('vehiclePlate').value,
                status: document.getElementById('vehicleStatus').value,
                image: '🚙'
            };
            if (window.editingId) {
                const index = vehicles.findIndex(v => v.id === window.editingId);
                vehicles[index] = newVehicle;
                alert('Vehicle updated successfully');
            } else {
                vehicles.push(newVehicle);
                alert('Vehicle added successfully');
            }
            document.getElementById('vehicleModal').style.display = 'none';
            loadVehicles();
        });

        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentFilter = chip.dataset.filter;
                loadVehicles();
            });
        });

        document.getElementById('searchVehicle').addEventListener('input', (e) => { currentSearch = e.target.value; loadVehicles(); });
        document.querySelectorAll('.close, .modal-close').forEach(el => { el.addEventListener('click', () => document.getElementById('vehicleModal').style.display = 'none'); });
        document.getElementById('logoutBtn').addEventListener('click', () => { session.clearSession(); window.location.href = '../../login.html'; });
        document.getElementById('dropdownLogout').addEventListener('click', () => { session.clearSession(); window.location.href = '../../login.html'; });
        document.getElementById('userDropdown').addEventListener('click', () => document.querySelector('.dropdown-menu').classList.toggle('show'));
        document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('active'));

        loadVehicles();
    </script>
</body>
</html>
