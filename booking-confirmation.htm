<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Booking Confirmed | RwandaGo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
<style>body{background:linear-gradient(135deg,#0a3b2f 0%,#06261e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.confirmation-container{max-width:600px;width:100%;background:white;border-radius:24px;overflow:hidden;text-align:center}.confirmation-header{background:#27ae60;padding:2rem}.confirmation-header i{font-size:5rem;color:white;margin-bottom:1rem}.confirmation-header h1{color:white;font-size:1.8rem}.confirmation-body{padding:2rem}.booking-details{background:#f8f9fa;border-radius:16px;padding:1.5rem;margin:1.5rem 0;text-align:left}.detail-row{display:flex;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid #e0e0e0}.btn-group{display:flex;gap:1rem;margin-top:1.5rem}.btn-primary{flex:1;background:#e67e22;color:white;text-decoration:none;padding:1rem;border-radius:12px;font-weight:600}.btn-outline{flex:1;border:2px solid #e67e22;background:transparent;color:#e67e22;text-decoration:none;padding:1rem;border-radius:12px;font-weight:600}@media(max-width:480px){.btn-group{flex-direction:column}}</style>
</head>
<body>
<div class="confirmation-container">
<div class="confirmation-header"><i class="fas fa-check-circle"></i><h1>Booking Confirmed!</h1><p style="color:rgba(255,255,255,0.8);margin-top:0.5rem">Your vehicle has been reserved</p></div>
<div class="confirmation-body"><h2>Booking #BK001234</h2>
<div class="booking-details"><div class="detail-row"><strong>Vehicle</strong><span>Toyota RAV4</span></div><div class="detail-row"><strong>Pickup Date</strong><span>December 1, 2024 - 10:00 AM</span></div><div class="detail-row"><strong>Return Date</strong><span>December 5, 2024 - 10:00 AM</span></div><div class="detail-row"><strong>Total Amount</strong><span style="color:#e67e22;font-weight:800">$275</span></div><div class="detail-row"><strong>Deposit Paid</strong><span>$55 (20%)</span></div></div>
<p><i class="fas fa-envelope"></i> Confirmation sent to your email</p>
<div class="btn-group"><a href="dashboard/tourist/active-trip.html" class="btn-primary">View My Trip</a><a href="dashboard/tourist/bookings.html" class="btn-outline">My Bookings</a></div>
</div></div>
</body>
</html>
